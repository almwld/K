name: Build Flex Yemen APK (Ultra Small)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android project structure
        run: |
          mkdir -p android/app/src/main/kotlin/com/flexyemen/flex_yemen
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

      - name: Create debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Create gradle.properties (Ultra Compression)
        run: |
          cat > android/gradle.properties << 'GRADLEPROPS'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8.fullMode=true
          android.enableR8.libraries=true
          android.r8.maxWorkers=4
          GRADLEPROPS

      - name: Create settings.gradle
        run: |
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.5.0" apply false
              id "org.jetbrains.kotlin.android" version "2.0.21" apply false
          }
          
          include ":app"
          SETTINGS

      - name: Create build.gradle (project level)
        run: |
          cat > android/build.gradle << 'PROJECTGRADLE'
          buildscript {
              ext.kotlin_version = '2.0.21'
              repositories {
                  google()
                  mavenCentral()
              }
              
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          PROJECTGRADLE

      - name: Create app build.gradle (Max Compression)
        run: |
          cat > android/app/build.gradle << 'APPGRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          android {
              namespace "com.flexyemen.flex_yemen"
              compileSdk 34
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
              
              defaultConfig {
                  applicationId "com.flexyemen.flex_yemen"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
                  resConfigs "ar", "en"
              }
              
              signingConfigs {
                  release {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }
              
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                      zipAlignEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              packaging {
                  resources {
                      excludes += ['/META-INF/{AL2.0,LGPL2.1}', 'META-INF/*.kotlin_module', 'DebugProbesKt.bin', '**/*.proto', '**/*.bin']
                  }
                  jniLibs {
                      keepDebugSymbols = []
                  }
              }
          }
          
          flutter {
              source '../..'
          }
          
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
              implementation 'androidx.multidex:multidex:2.0.1'
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          
          configurations.all {
              resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
              }
          }
          APPGRADLE

      - name: Create proguard-rules.pro (Aggressive)
        run: |
          cat > android/app/proguard-rules.pro << 'PROGUARD'
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.** { *; }
          -keep class io.flutter.util.** { *; }
          -keep class io.flutter.view.** { *; }
          -keep class io.flutter.** { *; }
          -keep class io.flutter.plugins.** { *; }
          -keep class io.supabase.** { *; }
          -keep class com.supabase.** { *; }
          -keep class com.google.gson.** { *; }
          -keep class androidx.lifecycle.** { *; }
          -keep class com.google.firebase.** { *; }
          
          -assumenosideeffects class android.util.Log {
              public static *** v(...);
              public static *** d(...);
              public static *** i(...);
              public static *** w(...);
              public static *** e(...);
          }
          
          -assumenosideeffects class kotlin.jvm.internal.Intrinsics {
              static void checkNotNullParameter(java.lang.Object, java.lang.String);
          }
          
          -allowaccessmodification
          -repackageclasses
          -optimizationpasses 10
          -overloadaggressively
          -dontnote **
          -dontwarn **
          PROGUARD

      - name: Create gradle-wrapper.properties
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip
          WRAPPER

      - name: Create AndroidManifest.xml (Minimal)
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.flexyemen.flex_yemen">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="Flex Yemen"
                  android:icon="@mipmap/ic_launcher"
                  android:extractNativeLibs="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Create MainActivity.kt
        run: |
          cat > android/app/src/main/kotlin/com/flexyemen/flex_yemen/MainActivity.kt << 'ACTIVITY'
          package com.flexyemen.flex_yemen
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          ACTIVITY

      - name: Create styles.xml
        run: |
          cat > android/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
          </resources>
          STYLES

      - name: Create launch_background.xml
        run: |
          cat > android/app/src/main/res/drawable/launch_background.xml << 'BACKGROUND'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/black" />
          </layer-list>
          BACKGROUND

      - name: Create colors.xml
        run: |
          cat > android/app/src/main/res/values/colors.xml << 'COLORS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="black">#FF000000</color>
          </resources>
          COLORS

      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Remove unused assets and plugins
        run: |
          # حذف الحزم غير الضرورية
          flutter pub remove flutter_facebook_auth 2>/dev/null || true
          flutter pub remove google_sign_in 2>/dev/null || true
          flutter pub remove sign_in_with_apple 2>/dev/null || true
          flutter pub remove twitter_login 2>/dev/null || true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons:main

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build Ultra Small APK
        run: |
          flutter clean
          flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons:main
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --no-tree-shake-icons

      - name: Display APK sizes
        run: |
          echo "=== أحجام APK النهائية ==="
          ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apks-ultra-small
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
