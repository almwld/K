name: Build Flex Yemen APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Android project structure
        run: |
          mkdir -p android/app/src/main/kotlin/com/flexyemen/flex_yemen
          mkdir -p android/gradle/wrapper
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

      - name: Create gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=true
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8.fullMode=false
          android.enableR8.libraries=false
          EOF

      - name: Create settings.gradle
        run: |
          cat > android/settings.gradle << 'SETTINGS'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.2.2" apply false
              id "org.jetbrains.kotlin.android" version "2.2.0" apply false
          }
          include ":app"
          SETTINGS

      - name: Create build.gradle (project level)
        run: |
          cat > android/build.gradle << 'PROJECTGRADLE'
          buildscript {
              ext.kotlin_version = '2.2.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          PROJECTGRADLE

      - name: Create app build.gradle
        run: |
          cat > android/app/build.gradle << 'APPGRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }
          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }
          android {
              namespace "com.flexyemen.flex_yemen"
              compileSdk 34
              ndkVersion "25.1.8937393"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions {
                  jvmTarget = '17'
                  freeCompilerArgs += ['-Xjvm-default=all']
              }
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              defaultConfig {
                  applicationId "com.flexyemen.flex_yemen"
                  minSdk 24
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              packagingOptions {
                  exclude 'META-INF/*.kotlin_module'
                  exclude 'META-INF/*.version'
                  jniLibs {
                      useLegacyPackaging true
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          APPGRADLE

      - name: Create proguard-rules.pro (مبسط)
        run: |
          cat > android/app/proguard-rules.pro << 'PROGUARD'
          -keep class io.flutter.** { *; }
          -keep class com.google.firebase.** { *; }
          -keep class io.supabase.** { *; }
          -keep class com.onesignal.** { *; }
          -keepattributes *Annotation*
          -keepattributes SourceFile,LineNumberTable
          -dontwarn javax.annotation.**
          -dontwarn org.conscrypt.**
          PROGUARD

      - name: Create gradle-wrapper.properties
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          WRAPPER

      - name: Create AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              
              <application
                  android:label="Flex Yemen"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  tools:replace="android:label">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          MANIFEST

      - name: Create MainActivity.kt
        run: |
          cat > android/app/src/main/kotlin/com/flexyemen/flex_yemen/MainActivity.kt << 'ACTIVITY'
          package com.flexyemen.flex_yemen
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity()
          ACTIVITY

      - name: Create styles.xml
        run: |
          cat > android/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
          </resources>
          STYLES

      - name: Create launch_background.xml
        run: |
          cat > android/app/src/main/res/drawable/launch_background.xml << 'BACKGROUND'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
          </layer-list>
          BACKGROUND

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://ziqpohdxtermunnhlkm.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppcXBvaGR4dGVtc211bm5obGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODQzNDcsImV4cCI6MjA4NzM2MDM0N30.ABAg5YZSrrAtBTWATJ3eRTmo4BuZVyVlrMV1HZjRWs0" >> .env
          echo "MINIMAX_API_KEY=sk-api-3srQHm600IiTt7ibuFkqWMB62Y2EQHpjwRLyisrT6jZTReILYdyalX-KZnPD_nftvrmNthCmNx3gBnpZdB_0j_YqV4rg0zINGWotoyhHx9sy8vMN9Y-PHJo" >> .env
          echo "MINIMAX_GROUP_ID=1871489234567890123" >> .env

      - name: Generate App Icons
        run: |
          flutter pub add --dev flutter_launcher_icons
          flutter pub get
          flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
