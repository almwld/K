name: flex_yemen
description: Flex Yemen - منصة التجارة الإلكترونية اليمنية
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1

  # State Management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.5.3
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2

  # Network
  connectivity_plus: ^6.0.5
  dio: ^5.4.3+1
  url_launcher: ^6.3.0
  http: ^1.2.0

  # Biometric
  local_auth: ^2.1.8

  # Images
  image_picker: ^1.1.0
  path_provider: ^2.1.3
  flutter_image_compress: ^2.1.0

  # Maps
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  flutter_map_cancellable_tile_provider: ^3.0.0

  # QR & Sharing
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2

  # Charts
  fl_chart: ^0.68.0

  # Utils
  dropdown_button2: ^2.0.0
  equatable: ^2.0.5

  # Firebase & Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  flutter_local_notifications: ^16.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600

  assets:
    - .env
    - assets/animations/
    - assets/images/
    - assets/images/products/
    - assets/icons/
    - assets/icons/svg/

  # Push Notifications
  onesignal_flutter: ^5.0.0
