name: flex_yemen
description: Flex Yemen - سوق يمني شامل للتجارة الإلكترونية
version: 2.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  
  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Location & Maps
  geolocator: ^10.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Sharing & Launch
  share_plus: ^7.2.2
  url_launcher: ^6.2.1
  
  # Notifications
  flutter_local_notifications: ^16.3.2
  
  # Localization
  intl: ^0.18.1
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/svg/
    - assets/icons/svg/social/
    - assets/images/
    - assets/images/products/
    - assets/animations/
  
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
