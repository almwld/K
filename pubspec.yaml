name: flex_yemen
description: Flex Yemen Market - السوق الإلكتروني اليمني
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  lottie: ^3.1.0
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_animate: ^4.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  
  # State Management
  provider: ^6.1.2
  
  # Backend & Storage
  supabase_flutter: ^2.5.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  
  # Biometric - الحل الحقيقي
  local_auth: ^2.1.8
  
  # Network
  connectivity_plus: ^6.0.5
  dio: ^5.4.3+1
  
  # Images & Files
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  path_provider: ^2.1.3
  flutter_cache_manager: ^3.3.2
  
  # Maps
  flutter_map: ^6.1.1
  latlong2: ^0.9.1
  
  # QR & Sharing
  qr_flutter: ^4.1.0
  share_plus: ^9.0.0
  mobile_scanner: ^4.0.1
  
  # Charts
  fl_chart: ^0.68.0
  
  # Utils
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  dropdown_button2: ^2.0.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  lottie: ^3.1.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
