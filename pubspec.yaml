name: flex_yemen
description: Flex Yemen - Yemeni E-commerce Platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  carousel_slider: ^4.2.1
  flutter_animate: ^4.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Chat
  flutter_chat_ui: ^1.6.12
  
  # Payment
  webview_flutter: ^4.5.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Biometric
  local_auth: ^2.1.7
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Utils
  url_launcher: ^6.2.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - .env
  
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
