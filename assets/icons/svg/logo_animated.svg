<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F4E4A6"/>
      <stop offset="100%" stop-color="#AA8C2C"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path fill="url(#goldGrad)" d="M60 70 L60 130 L80 130 L80 100 L100 100 L100 130 L140 130 L140 70 L120 70 L120 100 L100 100 L100 70 Z">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="1; 0.95; 1" 
        dur="2s" 
        repeatCount="indefinite" 
        additive="sum"
        pivot="100,100" />
    </path>

    <circle cx="100" cy="55" r="15" fill="url(#goldGrad)">
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        values="0,0; 0,15; 0,0" 
        dur="2s" 
        repeatCount="indefinite" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
      
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="1; 0.8; 1" 
        dur="2s" 
        repeatCount="indefinite" 
        additive="sum"
        pivot="100,55" />
    </circle>
  </g>
</svg>
